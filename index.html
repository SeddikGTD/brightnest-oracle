<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>BrightNest Oracle</title>
</head>
<body>
    <div id="status">يتم التحضير...</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const statusDiv = document.getElementById('status');
        
        async function connect() {
            try {
                statusDiv.innerText = "جاري الاتصال...";
                // تغيير اسم المتغير إلى 'client' لتجنب التعارض
                const client = supabase.createClient(
                    'https://bnfwhlvtxemldrcrhvhg.supabase.co', 
                    'sb_publishable_vbbmxwqOzNif8GKsD3r6-Q_FfuNB3Ik'
                );
                
                const { data, error } = await client.from('signals').select('*');
                
                if (error) {
                    statusDiv.innerText = "خطأ من قاعدة البيانات: " + error.message;
                } else {
                    statusDiv.innerText = "تم الاتصال بنجاح! عدد البيانات: " + data.length;
                }
            } catch (err) {
                statusDiv.innerText = "خطأ: " + err.message;
            }
        }
        
        connect();
    </script>
</body>
</html>
